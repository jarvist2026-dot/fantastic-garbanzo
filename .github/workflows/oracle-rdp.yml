name: Oracle Free RDP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  create-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Setup OCI CLI
        run: |
          pip install oci-cli --quiet
          mkdir -p ~/.oci

          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=ocid1.user.oc1..aaaaaaaanzvgw4ycj53j43qnimbg7rpm7uaaj23iopbujcgsqz6d4fl6bzma
          fingerprint=9a:85:f8:8a:da:0d:ac:12:18:d1:b9:3e:a9:93:42:1a
          tenancy=ocid1.tenancy.oc1..aaaaaaaa3vbpnmnrmjurxpohzfayptoiscbbymfx5lx7r5waqernhr5n2zwa
          region=eu-paris-1
          key_file=/home/runner/.oci/private_key.pem
          EOF

          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem
          chmod 600 ~/.oci/config

      - name: Launch Oracle Instance
        run: |
          SSH_PUB_KEY="ssh-rsa  ubuntu@llllm"

          USERDATA=$(printf '%s' '#!/bin/bash
          apt-get update -y
          apt-get install -y xrdp xfce4 xfce4-goodies ufw
          echo xfce4-session > /home/ubuntu/.xsession
          chown ubuntu:ubuntu /home/ubuntu/.xsession
          systemctl enable xrdp && systemctl start xrdp
          echo "ubuntu:RDPpass2024!" | chpasswd
          ufw allow 3389/tcp && ufw --force enable' | base64 -w0)

          ATTEMPT=0
          while true; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "[#$ATTEMPT | $(date +%H:%M:%S)] Trying..."

            RESULT=$(oci compute instance launch \
              --region "eu-paris-1" \
              --compartment-id "ocid1.tenancy.oc1..aaaaaaaa3vbpnmnrmjurxpohzfayptoiscbbymfx5lx7r5waqernhr5n2zwa" \
              --availability-domain "fVnT:EU-PARIS-1-AD-1" \
              --shape "VM.Standard.E2.1.Micro" \
              --subnet-id "ocid1.subnet.oc1.eu-paris-1.aaaaaaaajcfzbkvnd6porfdnqedallse2s36ljp4cpjaxceptksoj2wb4c7a" \
              --image-id "ocid1.image.oc1.eu-paris-1.aaaaaaaabgr2mvwjeufsymylnoe3h6v7sc5wqd6urx762brbcfrqu6rtrdva" \
              --assign-public-ip true \
              --display-name "free-rdp" \
              --user-data "$USERDATA" \
              --metadata "{\"ssh_authorized_keys\": \"$SSH_PUB_KEY\"}" \
              2>&1)

            if echo "$RESULT" | grep -q '"id"'; then
              echo "✅ Instance created!"
              INSTANCE_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")

              for i in {1..30}; do
                STATE=$(oci compute instance get \
                  --instance-id "$INSTANCE_ID" \
                  --query "data.\"lifecycle-state\"" \
                  --raw-output 2>/dev/null)
                echo "State: $STATE"
                [ "$STATE" == "RUNNING" ] && break
                sleep 15
              done

              PUBLIC_IP=$(oci compute instance list-vnics \
                --instance-id "$INSTANCE_ID" \
                --query "data[0].\"public-ip\"" \
                --raw-output)

              echo ""
              echo "======================================="
              echo "  ✅ RDP READY (wait 5min for xRDP)"
              echo "  Host     : $PUBLIC_IP:3389"
              echo "  Username : ubuntu"
              echo "  Password : RDPpass2024!"
              echo "======================================="
              exit 0

            elif echo "$RESULT" | grep -q "Out of host capacity\|LimitExceeded"; then
              echo "❌ No capacity — retrying in 60s..."
              sleep 60
            else
              echo "⚠️ $(echo "$RESULT" | tail -2)"
              sleep 60
            fi
          done
